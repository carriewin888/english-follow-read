<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>英语趣味测试</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; padding: 16px; }
    .container { max-width: 480px; margin:0 auto; }

    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; color: #333; margin-bottom: 4px; }
    .date { font-size: 13px; color: #999; margin-bottom: 12px; }

    .timer-bar { height: 6px; background: #eee; border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
    .timer-fill { height: 100%; background: linear-gradient(90deg, #f5576c, #f093fb); transition: width 1s linear; }
    .timer-text { text-align: center; font-size: 14px; color: #999; margin-bottom: 8px; }
    .timer-text.warning { color: #f5576c; font-weight: 700; }
    .progress-text { text-align: center; font-size: 13px; color: #999; margin-bottom: 12px; }

    .question-card { background: #f8f9ff; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .question-type { font-size: 12px; color: #f5576c; font-weight: 600; margin-bottom: 8px; }
    .question-text { font-size: 16px; color: #333; line-height: 1.6; margin-bottom: 12px; }
    .word-display { font-size: 28px; font-weight: 700; color: #f5576c; text-align: center; margin: 12px 0; cursor: pointer; }
    .play-btn { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; border-radius: 20px; padding: 8px 16px; font-size: 14px; cursor: pointer; margin-bottom: 12px; }
    .play-btn:active { transform: scale(0.96); }

    .options { display: flex; flex-direction: column; gap: 8px; }
    .option-btn { background: white; border: 2px solid #eee; border-radius: 10px; padding: 12px 16px; font-size: 15px; cursor: pointer; transition: all 0.2s; text-align: left; }
    .option-btn:hover { border-color: #f5576c; }
    .option-btn.selected { border-color: #f5576c; background: #fff0f3; }
    .option-btn.correct { border-color: #2ecc71; background: #e8f8f0; color: #27ae60; cursor: default; }
    .option-btn.wrong { border-color: #e74c3c; background: #fdf0ef; color: #e74c3c; cursor: default; }
    .option-btn.dimmed { opacity: 0.5; cursor: default; }

    .spell-input { width: 100%; padding: 12px 16px; font-size: 18px; border: 2px solid #eee; border-radius: 10px; outline: none; text-align: center; letter-spacing: 4px; }
    .spell-input:focus { border-color: #f5576c; }
    .spell-input.correct { border-color: #2ecc71; background: #e8f8f0; }
    .spell-input.wrong { border-color: #e74c3c; background: #fdf0ef; }
    .spell-hint { font-size: 12px; color: #999; text-align: center; margin-top: 6px; }

    .sentence-display { font-size: 16px; line-height: 2; color: #333; }
    .blank-input { width: 90px; padding: 4px 8px; font-size: 15px; border: 2px solid #ddd; border-radius: 6px; text-align: center; }

    .nav-buttons { display: flex; gap: 8px; margin-top: 12px; }
    .nav-btn { flex:1; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-prev { background: #eee; color: #666; }
    .btn-prev:not(:disabled):hover { background: #ddd; }
    .btn-next { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
    .btn-next:not(:disabled):hover { opacity: 0.9; }

    .result-card { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border-radius: 16px; padding: 24px; text-align: center; display: none; }
    .result-card.show { display: block; }
    .result-score { font-size: 64px; font-weight: 800; margin: 16px 0; }
    .result-label { font-size: 14px; opacity: 0.8; }
    .result-detail { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 12px; margin-top: 16px; font-size: 14px; line-height: 1.8; text-align: left; }
    .chat-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: rgba(255,255,255,0.95); color: #f5576c; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px; }
    .retry-btn { width: 100%; padding: 12px; border: 2px solid rgba(255,255,255,0.5); border-radius: 10px; background: transparent; color: white; font-size: 15px; cursor: pointer; margin-top: 8px; }

    .start-card { text-align: center; padding: 32px 20px; }
    .start-icon { font-size: 64px; margin-bottom: 16px; }
    .start-desc { font-size: 14px; color: #666; line-height: 1.8; margin: 12px 0 24px; }
    .start-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f093fb, #f5576c); color: white; font-size: 18px; font-weight: 600; cursor: pointer; }
    .start-btn:not(:disabled):hover { opacity: 0.9; }
  </style>
</head>
<body>
<div class="container">

  <!-- 开始页 -->
  <div class="card start-card" id="start-page">
    <div class="start-icon">🎮</div>
    <h1 id="quiz-title">英语趣味测试</h1>
    <div class="date" id="quiz-date"></div>
    <div class="start-desc">
      ⏱️ 限时 <b>10分钟</b><br>
      📝 共 <b id="q-count">0</b> 道趣味题目<br>
      🔊 点击单词可听发音<br>
      📝 拼写 · 选择 · 填空<br>
      加油哦！
    </div>
    <button class="start-btn" id="start-btn" onclick="startQuiz()">🚀 开始挑战</button>
  </div>

  <!-- 答题页 -->
  <div class="card" id="quiz-page" style="display:none;">
    <div class="timer-text" id="timer-text">⏱️ 10:00</div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    <div class="progress-text" id="progress-text">第 1 题 / 共 1 题</div>
    <div class="question-card">
      <div class="question-type" id="q-type"></div>
      <div class="question-text" id="q-text"></div>
      <div id="q-media"></div>
      <div id="q-body"></div>
    </div>
    <!-- 导航按钮 -->
    <div class="nav-buttons">
      <button class="nav-btn btn-prev" id="prev-btn" onclick="goPrev()">← 上一题</button>
      <button class="nav-btn btn-next" id="next-btn" onclick="handleNext()">确认答案</button>
    </div>
  </div>

  <!-- 结果页 -->
  <div class="result-card" id="result-page">
    <div class="result-label">测试成绩</div>
    <div class="result-score" id="result-score">--</div>
    <div class="result-label" id="result-grade"></div>
    <div class="result-detail" id="result-detail"></div>
    <button class="chat-btn" onclick="goToChat()">💬 和 AI 老师聊天</button>
    <button class="retry-btn" onclick="location.reload()">🔄 再做一次</button>
  </div>

</div>

<script>
// ========== 状态 ==========
var questions = [];
var currentIndex = 0;
var score = 0;
// answers[i] = userAnswer (可以是 number 或 string)，未答 = undefined
var answers = [];
var timerInterval = null;
var timeLeft = 600;
// 是否已提交（提交后禁止修改）
var quizFinished = false;

// ========== 安全解码 ==========
function b64DecodeUnicode(str) {
  try {
    var binary = atob(str);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  } catch(e) { return ""; }
}

// ========== 语音播放 ==========
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.85;
  var voices = window.speechSynthesis.getVoices();
  for (var v = 0; v < voices.length; v++) {
    if (voices[v].lang && voices[v].lang.startsWith('en')) { u.voice = voices[v]; break; }
  }
  window.speechSynthesis.speak(u);
}
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
}

// ========== 初始化 ==========
function initPage() {
  var params = new URLSearchParams(location.search);
  document.getElementById("quiz-title").textContent = params.get("title") || "英语趣味测试";
  document.getElementById("quiz-date").textContent = params.get("date") || new Date().toLocaleDateString("zh-CN");

  var quizData = params.get("quiz");
  if (quizData) {
    try {
      var jsonStr = b64DecodeUnicode(quizData);
      var parsed = JSON.parse(jsonStr);
      questions = parsed.questions || parsed;
    } catch(e) {
      try {
        var parsed2 = JSON.parse(decodeURIComponent(quizData));
        questions = parsed2.questions || parsed2;
      } catch(e2) {}
    }
  }

  var quizJson = params.get("quiz_json");
  if (quizJson) {
    try {
      var parsed3 = JSON.parse(decodeURIComponent(quizJson));
      questions = parsed3.questions || parsed3;
    } catch(e3) {}
  }

  for (var i = 0; i < questions.length; i++) {
    if (questions[i].choices && !questions[i].options) questions[i].options = questions[i].choices;
    if (questions[i].audio_text && !questions[i].word) questions[i].word = questions[i].audio_text;
  }

  document.getElementById("q-count").textContent = questions.length || "--";
  if (!questions || !questions.length) {
    document.querySelector(".start-desc").innerHTML += "<br><br>⚠️ 未获取到题目，请返回重新进入";
    document.getElementById("start-btn").disabled = true;
  }

  answers = new Array(questions.length);
}

// ========== 开始测试 ==========
function startQuiz() {
  var timeLimit = new URLSearchParams(location.search).get("time_limit");
  timeLeft = timeLimit ? parseInt(timeLimit) : 600;
  document.getElementById("start-page").style.display = "none";
  document.getElementById("quiz-page").style.display = "block";
  startTimer();
  showQuestion(0);
}

// ========== 计时器 ==========
function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(function() {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
  }, 1000);
}

function updateTimerDisplay() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  var sStr = s < 10 ? "0" + s : "" + s;
  document.getElementById("timer-text").textContent = "⏱️ " + m + ":" + sStr;
  document.getElementById("timer-text").className = timeLeft <= 60 ? "timer-text warning" : "timer-text";
  document.getElementById("timer-fill").style.width = Math.max(0, timeLeft / 600 * 100) + "%";
}

// ========== 显示题目 ==========
function showQuestion(index) {
  if (index < 0 || index >= questions.length) return;
  currentIndex = index;
  var q = questions[index];

  document.getElementById("progress-text").textContent =
    "第 " + (index+1) + " 题 / 共 " + questions.length + " 题";

  var typeNames = {
    listen_choice: "🔊 听音选义",
    listen_spell: "✍️ 听音拼写",
    sentence_blank: "📝 句型填空",
    grammar_choice: "📖 语法问答"
  };
  document.getElementById("q-type").textContent = typeNames[q.type] || q.type;

  var mediaHtml = "";
  var bodyHtml = "";

  // 当前题的已保存答案
  var savedAnswer = answers[index];

  switch(q.type) {

    case "listen_choice": {
      var word = q.word || "";
      var safeWord = word.replace(/'/g, "\\'");
      mediaHtml = '<div class="word-display" onclick="speakWord(this,\'' + safeWord + '\')">🔊 ' + word + '</div>';
      document.getElementById("q-text").textContent = "请听发音，选择正确的中文意思：";

      var optionsHtml = q.options.map(function(opt, i) {
        var cls = "option-btn";
        if (quizFinished) {
          // 已提交：显示正确答案/错误答案
          if (i === q.answer) cls += " correct";
          else if (savedAnswer === i && i !== q.answer) cls += " wrong";
          else cls += " dimmed";
        } else {
          if (savedAnswer === i) cls += " selected";
        }
        return '<button class="' + cls + '" ' +
          (quizFinished ? '' : 'onclick="selectOption(' + i + ')"') +
          '>' + opt + '</button>';
      }).join("");
      bodyHtml = '<div class="options">' + optionsHtml + '</div>';
      setTimeout(function() { speak(word); }, 500);
      break;
    }

    case "listen_spell": {
      var word = q.word || "";
      var safeWord = word.replace(/'/g, "\\'");
      mediaHtml = '<button class="play-btn" onclick="speakWord(this,\'' + safeWord + '\')">🔊 点击播放发音</button>';
      document.getElementById("q-text").textContent = "请听发音，拼写正确的英文单词：";

      var inputVal = savedAnswer !== undefined ? savedAnswer : "";
      var inputCls = "spell-input";
      if (quizFinished) {
        if (inputVal.toLowerCase() === (q.answer || "").toLowerCase()) inputCls += " correct";
        else inputCls += " wrong";
      }
      bodyHtml = '<input class="' + inputCls + '" id="spell-input" type="text" placeholder="输入英文单词" autocomplete="off" value="' + escapeHtml(inputVal) + '" ' +
        (quizFinished ? 'disabled' : '') + '><div class="spell-hint">提示：' + (q.hint || "点击上方按钮听发音") + '</div>';
      setTimeout(function() { speak(word); }, 500);
      break;
    }

    case "sentence_blank": {
      var display = q.sentence || "";
      display = display.replace(/___/g, '<input class="blank-input" disabled placeholder="?">');
      document.getElementById("q-text").textContent = "请选择合适的词填入空白处：";

      var optionsHtml = q.options.map(function(opt, i) {
        var cls = "option-btn";
        if (quizFinished) {
          if (i === q.answer) cls += " correct";
          else if (savedAnswer === i && i !== q.answer) cls += " wrong";
          else cls += " dimmed";
        } else {
          if (savedAnswer === i) cls += " selected";
        }
        return '<button class="' + cls + '" ' +
          (quizFinished ? '' : 'onclick="selectOption(' + i + ')"') +
          '>' + opt + '</button>';
      }).join("");
      bodyHtml = '<div class="sentence-display">' + display + '</div><div class="options" style="margin-top:12px">' + optionsHtml + '</div>';
      break;
    }

    case "grammar_choice": {
      document.getElementById("q-text").textContent = q.question;
      var optionsHtml = q.options.map(function(opt, i) {
        var cls = "option-btn";
        if (quizFinished) {
          if (i === q.answer) cls += " correct";
          else if (savedAnswer === i && i !== q.answer) cls += " wrong";
          else cls += " dimmed";
        } else {
          if (savedAnswer === i) cls += " selected";
        }
        return '<button class="' + cls + '" ' +
          (quizFinished ? '' : 'onclick="selectOption(' + i + ')"') +
          '>' + opt + '</button>';
      }).join("");
      bodyHtml = '<div class="options">' + optionsHtml + '</div>';
      break;
    }
  }

  document.getElementById("q-media").innerHTML = mediaHtml;
  document.getElementById("q-body").innerHTML = bodyHtml;
  updateNavButtons();
}

// ========== 工具：转义 HTML 属性 ==========
function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ========== 更新导航按钮状态 ==========
function updateNavButtons() {
  var prevBtn = document.getElementById("prev-btn");
  var nextBtn = document.getElementById("next-btn");

  prevBtn.style.display = currentIndex > 0 ? "block" : "none";

  if (quizFinished) {
    nextBtn.textContent = currentIndex === questions.length - 1 ? "查看成绩" : "下一题 →";
    nextBtn.disabled = false;
  } else {
    // 未提交：按钮始终可点，空题也可确认（判为错）
    nextBtn.textContent = currentIndex === questions.length - 1 ? "📊 提交测试" : "确认答案";
    nextBtn.disabled = false;
  }
}

// ========== 语音按钮 ==========
function speakWord(btn, word) {
  speak(word);
  btn.style.transform = "scale(1.1)";
  setTimeout(function() { btn.style.transform = "scale(1)"; }, 200);
}

// ========== 选项选择 ==========
function selectOption(index) {
  if (quizFinished) return;
  answers[currentIndex] = index;
  var btns = document.querySelectorAll(".option-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle("selected", i === index);
  }
}

// ========== 下一题 / 确认答案 / 提交 ==========
function handleNext() {
  if (quizFinished) {
    // 提交后：查看成绩 或 下一题
    if (currentIndex < questions.length - 1) {
      showQuestion(currentIndex + 1);
    } else {
      finishQuiz();
    }
    return;
  }

  // 未提交：先保存当前答案（空题存 undefined 会被判错）
  saveCurrentAnswer();

  // 最后一题 → 提交测试
  if (currentIndex === questions.length - 1) {
    finishQuiz();
  } else {
    showQuestion(currentIndex + 1);
  }
}

// ========== 保存当前题的答案 ==========
function saveCurrentAnswer() {
  var q = questions[currentIndex];
  if (q.type === "listen_spell") {
    var input = document.getElementById("spell-input");
    if (input) {
      answers[currentIndex] = input.value.trim();
    }
  }
  // 选择题的答案已由 selectOption() 保存到 answers[currentIndex]
  // 无需额外操作
}

// ========== 上一题 ==========
function goPrev() {
  if (currentIndex <= 0) return;
  // 离开前保存当前答案
  if (!quizFinished) saveCurrentAnswer();
  showQuestion(currentIndex - 1);
}

// ========== 结束测试 ==========
function finishQuiz() {
  if (timerInterval) clearInterval(timerInterval);
  quizFinished = true;

  // 计算分数
  score = 0;
  for (var i = 0; i < questions.length; i++) {
    if (isAnswerCorrect(questions[i], answers[i])) score++;
  }

  document.getElementById("quiz-page").style.display = "none";
  var resultPage = document.getElementById("result-page");
  resultPage.classList.add("show");

  var total = questions.length;
  var pct = total > 0 ? Math.round(score / total * 100) : 0;
  document.getElementById("result-score").textContent = pct + " 分";

  var grade = "";
  if (pct >= 90) grade = "🌟 太棒了！你是英语小天才！";
  else if (pct >= 70) grade = "👍 不错哦！继续加油！";
  else if (pct >= 60) grade = "💪 再加把劲，你可以的！";
  else grade = "📖 多多练习，下次一定更好！";
  document.getElementById("result-grade").textContent = grade;

  var detail = "<b>答对：" + score + " / " + total + " 题</b>";
  for (var i = 0; i < questions.length; i++) {
    if (!isAnswerCorrect(questions[i], answers[i])) {
      var q = questions[i];
      var correctText = (q.type === "listen_spell") ? q.answer : q.options[q.answer];
      detail += "<br>第" + (i+1) + "题正确答案：<b>" + correctText + "</b>";
    }
  }
  document.getElementById("result-detail").innerHTML = detail;
}

function isAnswerCorrect(q, userAnswer) {
  if (userAnswer === undefined || userAnswer === null) return false;
  if (q.type === "listen_spell") {
    return (userAnswer || "").toLowerCase() === (q.answer || "").toLowerCase();
  }
  return userAnswer === q.answer;
}

// ========== 跳转到聊天 ==========
function goToChat() {
  var params = new URLSearchParams(location.search);
  var chatUrl = params.get("chat_url") || "chat.html";
  var topic = params.get("title") || "英语趣味测试";
  window.location.href = chatUrl + "?topic=" + encodeURIComponent(topic);
}

initPage();
</script>
</body>
</html>
